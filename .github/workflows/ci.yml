name: CI & Deploy

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      # The prebuild hook fetches ~23MB of model weights from HuggingFace and now
      # FAILS the build if it can't verify them. Cache on the script's hash — it
      # holds the pinned revision and the checksums, so a deliberate bump busts
      # the cache and nothing else does.
      - name: Cache embedding model
        uses: actions/cache@v4
        with:
          path: public/models/all-MiniLM-L6-v2
          key: embed-model-${{ hashFiles('scripts/fetch-embed-model.sh') }}
      - run: npm ci
      - run: npm test
      - run: npm run build # svelte-check + vite build

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      # The prebuild hook fetches ~23MB of model weights from HuggingFace and now
      # FAILS the build if it can't verify them. Cache on the script's hash — it
      # holds the pinned revision and the checksums, so a deliberate bump busts
      # the cache and nothing else does.
      - name: Cache embedding model
        uses: actions/cache@v4
        with:
          path: public/models/all-MiniLM-L6-v2
          key: embed-model-${{ hashFiles('scripts/fetch-embed-model.sh') }}
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run build
      - run: npm run e2e

  # Deploy to GitHub Pages, but only on a push to main and only after tests pass.
  deploy:
    needs: [test, e2e]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    concurrency:
      group: pages
      cancel-in-progress: false
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    # Deploy target: the GitHub Pages instance (secondary; the primary deploy is
    # https://mothtrap.blue — see docs/DEPLOY.md). Pages project paths follow the
    # repo name. To move to a subdomain, set APP_URL to that root and BASE_PATH
    # to "/", and point the OAuth client id at the new URL — nothing else changes.
    env:
      APP_URL: https://ryanheuser.com/mothtrap/
      BASE_PATH: /mothtrap/
      VITE_OAUTH_CLIENT_ID: https://ryanheuser.com/mothtrap/client-metadata.json
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      # The prebuild hook fetches ~23MB of model weights from HuggingFace and now
      # FAILS the build if it can't verify them. Cache on the script's hash — it
      # holds the pinned revision and the checksums, so a deliberate bump busts
      # the cache and nothing else does.
      - name: Cache embedding model
        uses: actions/cache@v4
        with:
          path: public/models/all-MiniLM-L6-v2
          key: embed-model-${{ hashFiles('scripts/fetch-embed-model.sh') }}
      - run: npm ci
      - run: npm run gen:metadata
      - run: npm run build
      # This instance is a static cloud deploy: no reachable Ollama, so hide it
      - run: |
          echo '{ "provider": "anthropic", "hideOllama": true }' > dist/mothtrap.config.json
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist
      - id: deploy
        uses: actions/deploy-pages@v4

  # Deploy to mothtrap.blue (the primary instance) — same gate as Pages: only on
  # a push to main, only after tests pass. Uses an rrsync-jailed deploy key that
  # can ONLY write into /var/www/mothtrap on the box (no shell, no other paths).
  deploy-blue:
    needs: [test, e2e]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-blue
      cancel-in-progress: false
    env:
      APP_URL: https://mothtrap.blue/
      VITE_OAUTH_CLIENT_ID: https://mothtrap.blue/client-metadata.json
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      # The prebuild hook fetches ~23MB of model weights from HuggingFace and now
      # FAILS the build if it can't verify them. Cache on the script's hash — it
      # holds the pinned revision and the checksums, so a deliberate bump busts
      # the cache and nothing else does.
      - name: Cache embedding model
        uses: actions/cache@v4
        with:
          path: public/models/all-MiniLM-L6-v2
          key: embed-model-${{ hashFiles('scripts/fetch-embed-model.sh') }}
      - run: npm ci
      - run: npm run gen:metadata
      - run: npm run build
      - name: rsync to mothtrap.blue
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          printf '%s\n' "$DEPLOY_KNOWN_HOSTS" >> ~/.ssh/known_hosts
          # the server-side deploy config is per-instance state — never delete it
          rsync -az --delete \
            --exclude mothtrap.config.json \
            --exclude skynets.config.json \
            -e "ssh -i ~/.ssh/deploy_key -o IdentitiesOnly=yes" \
            dist/ deploy@lltk.net:/
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_KNOWN_HOSTS: ${{ secrets.DEPLOY_KNOWN_HOSTS }}
      - name: smoke
        run: |
          curl -sf https://mothtrap.blue/ -o /dev/null
          curl -sf https://mothtrap.blue/mothtrap.config.json | grep -q '"lock": true'
          curl -sf https://mothtrap.blue/ollama/api/tags -o /dev/null
          echo "mothtrap.blue smoke OK"
