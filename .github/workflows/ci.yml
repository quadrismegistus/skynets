name: CI & Deploy

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run build # svelte-check + vite build

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run build
      - run: npm run e2e

  # Deploy to GitHub Pages, but only on a push to main and only after tests pass.
  deploy:
    needs: [test, e2e]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    concurrency:
      group: pages
      cancel-in-progress: false
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    # Deploy target: the GitHub Pages instance (secondary; the primary deploy is
    # https://mothtrap.blue — see docs/DEPLOY.md). Pages project paths follow the
    # repo name. To move to a subdomain, set APP_URL to that root and BASE_PATH
    # to "/", and point the OAuth client id at the new URL — nothing else changes.
    env:
      APP_URL: https://ryanheuser.com/mothtrap/
      BASE_PATH: /mothtrap/
      VITE_OAUTH_CLIENT_ID: https://ryanheuser.com/mothtrap/client-metadata.json
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run gen:metadata
      - run: npm run build
      # This instance is a static cloud deploy: no reachable Ollama, so hide it
      - run: |
          echo '{ "provider": "anthropic", "hideOllama": true }' > dist/mothtrap.config.json
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist
      - id: deploy
        uses: actions/deploy-pages@v4
