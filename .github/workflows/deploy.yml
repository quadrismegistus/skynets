name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

# Deploy target. To move to a subdomain (e.g. https://skynets.ryanheuser.com/),
# set APP_URL to that root and BASE_PATH to "/", and point the OAuth client id
# at the new URL — nothing else changes.
env:
  APP_URL: https://ryanheuser.com/skynets/
  BASE_PATH: /skynets/
  VITE_OAUTH_CLIENT_ID: https://ryanheuser.com/skynets/client-metadata.json

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run gen:metadata
      - run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - id: deploy
        uses: actions/deploy-pages@v4
